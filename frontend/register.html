<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Konjyosom Tech Solutions</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .register-page { min-height: 100vh; display: flex; }
        .register-image {
            flex: 1; background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; padding: 60px; position: relative; overflow: hidden;
        }
        .register-image::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="1.5" fill="rgba(255,255,255,0.08)"/></svg>');
            background-size: 200px 200px;
        }
        .register-image-content { position: relative; z-index: 1; text-align: center; }
        .register-image h2 { font-size: 32px; font-weight: 700; margin-bottom: 15px; }
        .register-image p { opacity: 0.85; line-height: 1.7; max-width: 400px; }
        .register-form-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px; background: var(--light);
        }
        .register-card {
            background: white; border-radius: var(--radius); padding: 40px;
            box-shadow: var(--shadow-lg); width: 100%; max-width: 500px;
        }
        .register-card .logo { justify-content: center; margin-bottom: 30px; font-size: 24px; }
        .register-card h2 { text-align: center; font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .register-card > p { text-align: center; color: var(--gray); font-size: 14px; margin-bottom: 30px; }
    </style>
</head>
<body class="register-page">
    <div class="register-image">
        <div class="register-image-content">
            <i class="fas fa-user-plus" style="font-size: 60px; margin-bottom: 20px; opacity: 0.3;"></i>
            <h2>Create Your Account</h2>
            <p>Join Konjyosom Tech Solutions to book services, request quotations, and manage your technology needs.</p>
        </div>
    </div>
    <div class="register-form-wrap">
        <div class="register-card">
            <a href="index.html" class="logo" style="display:flex;"><i class="fas fa-microchip"></i><span>Konjyosom</span> Tech</a>
            <h2>Get Started</h2>
            <p>Create your free account in minutes</p>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" placeholder="98XXXXXXXX" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select name="role" required>
                        <option value="">Select account type</option>
                        <option value="client">Client (Book Services)</option>
                        <option value="technician">Technician (Apply for Jobs)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray); cursor: pointer;">
                        <input type="checkbox" required style="width: auto;"> I agree to the <a href="#" style="color: var(--secondary);">Terms of Service</a> and <a href="#" style="color: var(--secondary);">Privacy Policy</a>
                    </label>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--gray);">
                Already have an account? <a href="login.html" style="color: var(--secondary); font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
