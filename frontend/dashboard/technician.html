<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Dashboard | Konjyosom Tech Solutions</title>
    <link rel="stylesheet" href="/frontend/assets/css/style.css">
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css">
    <link rel="stylesheet" href="/frontend/assets/css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dash-layout">
        <aside class="dash-sidebar" id="dashSidebar">
            <div class="dash-sidebar-header">
                <i class="fas fa-microchip"></i>
                <span>Konjyosom Tech</span>
            </div>
            <nav class="dash-nav">
                <a href="technician.html" class="dash-nav-item active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="#jobs" class="dash-nav-item" onclick="showTab('jobs')"><i class="fas fa-wrench"></i> My Jobs</a>
                <a href="#completed" class="dash-nav-item" onclick="showTab('completed')"><i class="fas fa-check-circle"></i> Completed</a>
                <a href="#" onclick="logout();return false;" class="dash-nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
            <div class="dash-sidebar-footer">
                <p>Tech Panel v1.0</p>
            </div>
        </aside>

        <main class="dash-main">
            <header class="dash-header">
                <div class="dash-toggle" id="dashToggle"><i class="fas fa-bars"></i></div>
                <div class="dash-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search jobs...">
                </div>
                <div class="dash-profile">
                    <div class="dash-profile-info">
                        <span id="userName">Technician</span>
                        <small><span class="badge badge-tech">Technician</span></small>
                    </div>
                    <img src="https://randomuser.me/api/portraits/men/45.jpg" alt="Tech">
                </div>
            </header>

            <div class="dash-content">
                <h1 class="dash-title">Technician Dashboard</h1>
                <p class="dash-subtitle">View and manage your assigned service jobs.</p>

                <div class="dash-stats">
                    <div class="stat-card">
                        <div class="stat-card-icon blue"><i class="fas fa-tasks"></i></div>
                        <div class="stat-card-info"><h3 id="assignedJobs">0</h3><p>Assigned Jobs</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon orange"><i class="fas fa-clock"></i></div>
                        <div class="stat-card-info"><h3 id="inProgress">0</h3><p>In Progress</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon green"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-card-info"><h3 id="completedJobs">0</h3><p>Completed</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-icon red"><i class="fas fa-star"></i></div>
                        <div class="stat-card-info"><h3>4.8</h3><p>Rating</p></div>
                    </div>
                </div>

                <div class="dash-card">
                    <div class="dash-card-header">
                        <h3><i class="fas fa-wrench" style="color:var(--secondary);margin-right:8px;"></i>Assigned Jobs</h3>
                    </div>
                    <div class="dash-card-body">
                        <div class="dash-table-wrap">
                            <table class="data-table">
                                <thead><tr><th>ID</th><th>Service</th><th>Client</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
                                <tbody id="techJobsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/frontend/assets/js/main.js"></script>
    <script src="/frontend/assets/js/api.js"></script>
    <script src="/frontend/assets/js/auth.js"></script>
    <script src="/frontend/assets/js/technician.js"></script>
    <script>
        document.getElementById('dashToggle').addEventListener('click', () => {
            document.getElementById('dashSidebar').classList.toggle('active');
        });
        function showTab(tab) {
            const el = document.getElementById(tab + 'Table') || document.querySelector('[id*="' + tab + '"]');
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
