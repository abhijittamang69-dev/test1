<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jobs | Technician</title>
    <link rel="stylesheet" href="/frontend/assets/css/style.css">
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css">
    <link rel="stylesheet" href="/frontend/assets/css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dash-layout">
        <aside class="dash-sidebar" id="dashSidebar">
            <div class="dash-sidebar-header"><i class="fas fa-microchip"></i><span>Konjyosom Tech</span></div>
            <nav class="dash-nav">
                <a href="dashboard.html" class="dash-nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="jobs.html" class="dash-nav-item active"><i class="fas fa-wrench"></i> My Jobs</a>
                <a href="job-details.html" class="dash-nav-item"><i class="fas fa-clipboard-list"></i> Job Details</a>
                <a href="upload-report.html" class="dash-nav-item"><i class="fas fa-upload"></i> Upload Report</a>
                <a href="#" onclick="logout();return false;" class="dash-nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="dash-main">
            <header class="dash-header">
                <div class="dash-toggle" id="dashToggle"><i class="fas fa-bars"></i></div>
                <h2 style="font-size:18px;font-weight:600;color:var(--primary);">My Jobs</h2>
                <div class="dash-profile">
                    <div class="dash-profile-info"><span>Technician</span><small><span class="badge badge-tech">Technician</span></small></div>
                    <img src="https://randomuser.me/api/portraits/men/45.jpg" alt="Tech">
                </div>
            </header>
            <div class="dash-content">
                <h1 class="dash-title">Assigned Jobs</h1>
                <p class="dash-subtitle">View and manage all your assigned service jobs.</p>
                <div class="dash-card">
                    <div class="dash-card-header">
                        <h3>Job List</h3>
                        <div style="display:flex;gap:10px;">
                            <select style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;"><option>All Status</option><option>Pending</option><option>In Progress</option><option>Completed</option></select>
                        </div>
                    </div>
                    <div class="dash-card-body">
                        <div class="dash-table-wrap">
                            <table class="data-table">
                                <thead><tr><th>ID</th><th>Service</th><th>Client</th><th>Location</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
                                <tbody id="techJobsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/frontend/assets/js/main.js"></script>
    <script src="/frontend/assets/js/api.js"></script>
    <script src="/frontend/assets/js/auth.js"></script>
    <script src="/frontend/assets/js/technician.js"></script>
    <script>document.getElementById('dashToggle').addEventListener('click', () => { document.getElementById('dashSidebar').classList.toggle('active'); });</script>
</body>
</html>
